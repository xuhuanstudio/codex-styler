name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  github-language:
    name: English GitHub metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check pull request title or main commit subjects
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: node scripts/check-github-language.mjs "$BASE_SHA" "$HEAD_SHA"

  web:
    name: Web, schema, and tests
    runs-on: ubuntu-latest
    env:
      ASTRO_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.4.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm theme:validate packages/theme-core/examples/minimal-theme.json
      - run: pnpm package:validate packages/theme-core/examples/minimal-companion.json

  manager-e2e:
    name: Manager E2E and screenshots
    runs-on: macos-15
    env:
      ASTRO_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.4.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @codex-styler/desktop exec playwright install chromium
      - run: pnpm test:e2e
      - name: Retain Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: manager-e2e-report
          path: |
            apps/desktop/test-results/**/*.png
            apps/desktop/test-results/**/error-context.md
          if-no-files-found: ignore
          retention-days: 14

  rust:
    name: Rust (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-2022]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - uses: pnpm/action-setup@v6
        if: runner.os == 'Windows'
        with:
          version: 11.4.0
      - uses: actions/setup-node@v7
        if: runner.os == 'Windows'
        with:
          node-version: 22
          cache: pnpm
      - name: Verify generated artifacts on Windows
        if: runner.os == 'Windows'
        working-directory: ${{ github.workspace }}
        run: |
          pnpm install --frozen-lockfile
          node packages/theme-core/scripts/generate-validator.mjs --check
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
