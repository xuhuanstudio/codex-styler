name: Windows compatibility report
description: Report Windows 11 x64 discovery, restart, runtime, update, or uninstall evidence
title: "windows: "
labels: ["windows", "compatibility", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: Run Settings → Diagnostics & compatibility first, preview the redacted report, export it, and attach the ZIP below. Codex Styler never uploads it automatically.
  - type: input
    id: styler-version
    attributes:
      label: Codex Styler version
      placeholder: 0.2.0-beta.8
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows version and build
      placeholder: Windows 11 24H2, build 26100
    validations:
      required: true
  - type: input
    id: codex-version
    attributes:
      label: Codex Desktop version
    validations:
      required: true
  - type: dropdown
    id: install-source
    attributes:
      label: Codex installation source
      options:
        - Microsoft Store
        - Standard installer
        - Nonstandard or portable location
        - Unknown
    validations:
      required: true
  - type: checkboxes
    id: coverage
    attributes:
      label: Completed checks
      options:
        - label: Install and first launch
        - label: Automatic Codex discovery
        - label: Start and apply
        - label: Confirmed quit and restart while Codex is open
        - label: Launch while Codex is closed
        - label: Theme and companion live switching
        - label: Pause and Restore official
        - label: Sleep and wake
        - label: Update from the previous preview
        - label: Uninstall
  - type: textarea
    id: result
    attributes:
      label: Result and reproduction
      description: State what passed, what failed, and numbered steps for every failure.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Redacted diagnostics ZIP
      description: Drag the ZIP exported by Codex Styler into this field.
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: I previewed the report and removed any private content before attaching it.
          required: true
        - label: This is not a security vulnerability.
          required: true
